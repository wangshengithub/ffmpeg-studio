<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - FFmpeg Studio</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <a href="/" class="auth-brand">
                    <span class="logo">🎬</span>
                    <span class="brand-text">FFmpeg Studio</span>
                </a>
                <h1>登录</h1>
                <p class="auth-subtitle">登录您的账户开始使用</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" class="form-control" required
                           placeholder="请输入用户名" autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" class="form-control" required
                           placeholder="请输入密码" autocomplete="current-password">
                </div>

                <div class="form-error" id="formError"></div>

                <button type="submit" class="btn btn-primary btn-block">
                    登录
                </button>
            </form>

            <div class="auth-footer">
                <p>还没有账户？<a href="/register">立即注册</a></p>
                <div class="auth-copyright">
                    <p>© 2026 <a href="https://github.com/wangshengithub/ffmpeg-studio" target="_blank">FFmpeg Studio</a></p>
                    <p>Powered by <a href="https://github.com/wangshengithub/ffmpeg-oneclick" target="_blank">ffmpeg-oneclick</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('formError');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // 清除错误
            errorEl.textContent = '';
            errorEl.style.display = 'none';

            // 禁用按钮
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            try {
                const result = await API.auth.login(username, password);

                if (result.success) {
                    // 保存token
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));

                    // 跳转到工作台
                    window.location.href = '/dashboard';
                } else {
                    errorEl.textContent = result.message || '登录失败';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = error.message || '登录失败，请稍后重试';
                errorEl.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            }
        });
    </script>
</body>
</html>
