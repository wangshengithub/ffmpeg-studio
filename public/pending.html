<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册成功 - FFmpeg Studio</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <a href="/" class="auth-brand">
                    <span class="logo">🎬</span>
                    <span class="brand-text">FFmpeg Studio</span>
                </a>
            </div>

            <div class="pending-message">
                <div class="pending-icon">✉️</div>
                <h1>注册成功！</h1>
                <p class="pending-text">您的账户已成功创建，但需要管理员审核后才能使用。</p>

                <div class="pending-info">
                    <h3>审核说明：</h3>
                    <ul>
                        <li>管理员会尽快审核您的注册申请</li>
                        <li>审核通过后您可以使用注册的用户名和密码登录</li>
                        <li>如有问题，请联系系统管理员</li>
                    </ul>
                </div>

                <div class="pending-actions">
                    <a href="/login" class="btn btn-primary">返回登录</a>
                    <a href="/" class="btn btn-outline">返回首页</a>
                </div>
            </div>

            <div class="auth-copyright">
                <p>© 2026 <a href="https://github.com/wangshengithub/ffmpeg-studio" target="_blank">FFmpeg Studio</a></p>
                <p>Powered by <a href="https://github.com/wangshengithub/ffmpeg-oneclick" target="_blank">ffmpeg-oneclick</a></p>
            </div>
        </div>
    </div>
</body>
</html>
